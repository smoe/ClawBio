name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-summary:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Commit summary
        run: |
          echo "## Commit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | $(git log -1 --format='%an') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | $(git log -1 --format='%s') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(git log -1 --format='%ci') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files changed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --stat HEAD~1 HEAD >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scikit-learn matplotlib requests

      - name: Test ClawBio CLI
        run: python clawbio.py list

      - name: Run PharmGx Reporter tests
        run: python -m pytest skills/pharmgx-reporter/tests/test_pharmgx.py -v

      - name: Run Equity Scorer tests
        run: python -m pytest skills/equity-scorer/tests/test_equity_scorer.py -v

      - name: Run NutriGx Advisor tests
        run: python -m pytest skills/nutrigx_advisor/tests/test_nutrigx.py -v

      - name: Run Genome Comparator tests
        run: python -m pytest skills/genome-compare/tests/test_genome_compare.py -v

      - name: Run ClinPGx tests
        run: python -m pytest skills/clinpgx/tests/test_clinpgx.py -v

      - name: Run GWAS PRS tests
        run: python -m pytest skills/gwas-prs/tests/test_gwas_prs.py -v

      - name: Run GWAS Lookup tests
        run: python -m pytest skills/gwas-lookup/tests/test_gwas_lookup.py -v

  scrna-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest scanpy==1.10.2 anndata==0.10.8 leidenalg==0.10.2 igraph==0.11.6 seaborn==0.13.2

      - name: Verify scRNA stack imports
        run: python -c "import scanpy, anndata, leidenalg, igraph; print('ok')"

      - name: Run scRNA Orchestrator tests
        run: python -m pytest skills/scrna-orchestrator/tests/test_scrna_orchestrator.py -v -rA
