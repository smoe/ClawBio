name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commit-summary:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2

      - name: Commit summary
        run: |
          echo "## Commit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | $(git log -1 --format='%an') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | $(git log -1 --format='%s') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(git log -1 --format='%ci') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files changed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --stat HEAD~1 HEAD >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Lint SKILL.md files for OpenClaw discoverability
        run: |
          python3 scripts/lint_skills.py | tee /tmp/skill_lint.md
          cat /tmp/skill_lint.md >> $GITHUB_STEP_SUMMARY
          python3 scripts/lint_skills.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest requests

      - name: Test ClawBio CLI
        run: python clawbio.py list

      - name: Run PharmGx Reporter tests
        run: python -m pytest skills/pharmgx-reporter/tests/test_pharmgx.py -v

      - name: Run Equity Scorer tests
        run: python -m pytest skills/equity-scorer/tests/test_equity_scorer.py -v

      - name: Run NutriGx Advisor tests
        run: python -m pytest skills/nutrigx_advisor/tests/test_nutrigx.py -v

      - name: Run Genome Comparator tests
        run: python -m pytest skills/genome-compare/tests/test_genome_compare.py -v

      - name: Run ClinPGx tests
        run: python -m pytest skills/clinpgx/tests/test_clinpgx.py -v

      - name: Run GWAS PRS tests
        run: python -m pytest skills/gwas-prs/tests/test_gwas_prs.py -v

      - name: Run GWAS Lookup tests
        run: python -m pytest skills/gwas-lookup/tests/test_gwas_lookup.py -v

      - name: Run RNA-seq DE tests
        run: python -m pytest skills/rnaseq-de/tests/test_rnaseq_de.py -v

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyyaml

      - name: Run reference genome benchmarks
        run: python -m pytest tests/benchmark/test_reference_genome.py -v

  scientific-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install ClawBio dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install clawbio-bench
        run: pip install git+https://github.com/biostochastics/clawbio_bench.git

      - name: Run scientific correctness audit (smoke)
        run: |
          mkdir -p results
          clawbio-bench --smoke --repo . || true

      - name: Render markdown summary
        if: always()
        run: |
          if ls results/suite/*/verdicts/*.json 1>/dev/null 2>&1; then
            SUITE_DIR=$(ls -d results/suite/*/ | head -1)
            clawbio-bench --render-markdown "$SUITE_DIR" --markdown-output results/summary.md || true
          fi

      - name: Upload bench verdicts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scientific-audit-verdicts
          path: results/
          retention-days: 30

      - name: Post summary
        if: always()
        run: |
          echo "## Scientific Correctness Audit" >> $GITHUB_STEP_SUMMARY
          if [ -f results/summary.md ]; then
            cat results/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Bench ran but no markdown summary was generated. Check artifacts." >> $GITHUB_STEP_SUMMARY
          fi
